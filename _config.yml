title: Context Window
tagline: Field notes on frontier AI across the Microsoft stack.
description: >-
  Microsoft AI and how it gets used at work. M365 Copilot, Copilot Studio,
  Agents 365, Cowork, and the occasional developer topic. Field notes from
  a Cloud Solution Architect.
url: "https://olivershackley1999.github.io"
baseurl: ""
lang: en
timezone: America/Los_Angeles

author:
  name: Oliver Shackley

github_username: olivershackley1999
social:
  name: Oliver Shackley
  links:
    - https://github.com/olivershackley1999
    - https://www.linkedin.com/in/oliver-shackley

# External profile links surfaced in the footer / "follow" block
profiles:
  github: https://github.com/olivershackley1999
  linkedin: https://www.linkedin.com/in/oliver-shackley

# Words-per-minute used to estimate read time on cards and articles
reading_wpm: 200

permalink: /posts/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: /feed.xml

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - tools
  - README.md
  - LICENSE
  - node_modules
  - "*.gem"
  - "*.gemspec"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
